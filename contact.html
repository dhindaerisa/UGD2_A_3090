<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="stylesheet.css">
    <title>Contact Me - Dhinda</title>
</head>
<body>
    <a href="index.html" class="home-icon">
        <img src="home.jpeg" alt="Home">
    </a>
    
    <nav>
        <a href="about.html">About me</a>
        <a href="skills.html">Skills</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html" class="btn-contact">CONTACT ME</a>
    </nav>

    <main class="contact-wrapper">
        <!-- Bagian Biru Muda (Kiri) - sama seperti section-left -->
        <div class="bg-biru">
            <div class="content-left">
                <h1 class="title-big">Contact Me</h1>
                <p class="desc-text">Lagi cari partner buat bangun projek impian atau cuma mau sekadar say hi? Gas! Hubungi data di bawah ini ya, aku bakal bales secepat kilat sebelum kamu sempet bilang 'BRB'.</p>
            </div>
        </div>

        <!-- Garis Miring Navy (Tengah) - sama seperti section-mid -->
        <div class="bg-navy"></div>

        <!-- Bagian Biru Tua (Kanan) dengan form - sama seperti section-right -->
        <div class="bg-merah">
            <div class="form-container">
                <h2 class="send-title">SEND MESSAGE</h2>
                <form>
                    <input type="text" placeholder="Enter your name*" required>
                    <input type="email" placeholder="Enter your email*" required>
                    <input type="text" placeholder="Phone number">
                    <textarea placeholder="Your message*" required></textarea>
                    <button type="submit" class="btn-submit">SUBMIT</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
